<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Image Auto Downloader</title>
    <style>
        body { width: 300px; padding: 15px; font-family: sans-serif; }
        input[type="text"] { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        #status { margin-top: 10px; font-size: 13px; color: #555; }
    </style>
</head>
<body>
    <h3>Auto Downloader</h3>
    <input type="text" id="keyword" placeholder="Nhập từ khoá (cách nhau bởi dấu phẩy ',')" />
    <button id="searchBtn">Tìm & Tải Ảnh</button>
    <div id="status"></div>
    <script src="popup.js"></script>
</body>
</html>
